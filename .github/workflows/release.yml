name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        type: string

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Determine version
      id: version
      shell: pwsh
      run: |
        if ("${{ github.event_name }}" -eq "workflow_dispatch") {
          $version = "${{ github.event.inputs.version }}"
        } else {
          $version = "${{ github.ref_name }}".TrimStart('v')
        }
        echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        echo "Building version: $version"

    - name: Restore dependencies
      run: dotnet restore DeepFocusForWindows/DeepFocusForWindows.csproj

    - name: Build self-contained (with .NET runtime)
      run: |
        dotnet publish DeepFocusForWindows/DeepFocusForWindows.csproj `
          -c Release `
          -r win-x64 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -p:IncludeNativeLibrariesForSelfExtract=true `
          -p:Version=${{ steps.version.outputs.VERSION }} `
          -o ./publish/self-contained

    - name: Build framework-dependent (requires .NET installation)
      run: |
        dotnet publish DeepFocusForWindows/DeepFocusForWindows.csproj `
          -c Release `
          -r win-x64 `
          --self-contained false `
          -p:PublishSingleFile=true `
          -p:Version=${{ steps.version.outputs.VERSION }} `
          -o ./publish/framework-dependent

    - name: Create release archives
      shell: pwsh
      run: |
        Compress-Archive -Path ./publish/self-contained/* -DestinationPath DeepFocusForWindows-v${{ steps.version.outputs.VERSION }}-self-contained.zip
        Compress-Archive -Path ./publish/framework-dependent/* -DestinationPath DeepFocusForWindows-v${{ steps.version.outputs.VERSION }}.zip

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', github.event.inputs.version) || github.ref_name }}
        name: Release ${{ steps.version.outputs.VERSION }}
        draft: false
        prerelease: false
        files: |
          DeepFocusForWindows-v${{ steps.version.outputs.VERSION }}-self-contained.zip
          DeepFocusForWindows-v${{ steps.version.outputs.VERSION }}.zip
        body: |
          ## DeepFocus for Windows v${{ steps.version.outputs.VERSION }}

          ### Downloads

          - **DeepFocusForWindows-v${{ steps.version.outputs.VERSION }}-self-contained.zip**: Standalone executable with .NET runtime included. No .NET installation required.
          - **DeepFocusForWindows-v${{ steps.version.outputs.VERSION }}.zip**: Lightweight executable. Requires .NET 10 runtime to be installed.

          ### Installation

          1. Download the appropriate zip file for your needs
          2. Extract the zip file
          3. Run `DeepFocusForWindows.exe`
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
